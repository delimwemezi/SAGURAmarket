<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background subtle glow -->
  <circle cx="250" cy="250" r="160" fill="url(#grad1)" opacity="0.15" filter="url(#glow)" />
  
  <!-- Outer Ring -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="url(#grad1)" stroke-width="8" stroke-dasharray="10 15" opacity="0.6"/>
  
  <!-- Abstract 'S' and Market Box Icon -->
  <path d="M 180 150 L 320 150 C 350 150, 350 210, 320 220 L 180 280 C 150 290, 150 350, 180 350 L 320 350" 
        fill="none" stroke="url(#grad1)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Intersecting Delivery Box Corner -->
  <path d="M 220 250 L 250 220 L 280 250 L 280 290 L 220 290 Z" fill="url(#grad2)" opacity="0.9" />
  <path d="M 250 220 L 250 290" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5" />
  
  <!-- Glowing Dots -->
  <circle cx="180" cy="150" r="10" fill="#60a5fa" />
  <circle cx="320" cy="350" r="10" fill="#34d399" />
</svg>
